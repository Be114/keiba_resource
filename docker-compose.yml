services:
  db:
    image: postgres:14
    container_name: keiba_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: keiba_app
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
    tty: true
    env_file:
      - .env

volumes:
  postgres_data: